services:
  postgres:
    image: postgres:16-alpine
    container_name: pana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pana
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pana -d pana"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pana-net

  api:
    build:
      context: ../src/Pana.Api
      dockerfile: Dockerfile
    container_name: pana-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/wwwroot/uploads
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pana;Username=pana;Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT__KEY}
      - Jwt__Issuer=${JWT__ISSUER:-Pana}
      - Jwt__Audience=${JWT__AUDIENCE:-Pana}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pana-net

  nginx:
    image: nginx:alpine
    container_name: pana-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - pana-net

volumes:
  pgdata:
  uploads:

networks:
  pana-net:
    driver: bridge
